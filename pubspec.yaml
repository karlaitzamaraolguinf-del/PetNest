name: petnest
description: "Refugio y tienda de mascotas con adopción y herramientas interactivas"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Manejo de estado
  provider: ^6.1.2

  # Firebase
  firebase_core: ^3.13.0
  firebase_auth: ^5.5.2

  # Inicio con Google
  google_sign_in: ^6.2.1

  # Huella digital
  local_auth: ^2.3.0

  # Cámara
  camera: ^0.11.1

  # Galería
  image_picker: ^1.1.2

  # URLs externas
  url_launcher: ^6.3.0

  # Animaciones
  lottie: ^3.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/icons/
    - assets/images/